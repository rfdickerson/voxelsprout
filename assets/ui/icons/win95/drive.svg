<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28">
  <!-- Floppy body -->
  <rect x="3" y="2" width="22" height="24" rx="1" fill="#2B3A67" stroke="#0E1530" stroke-width="1"/>
  <!-- Write-protect bevel (top-right clipped corner) -->
  <path d="M21,2 L25,6 L25,2 Z" fill="#0E1530"/>
  <!-- Metal shutter -->
  <rect x="8" y="2" width="12" height="9" fill="#B8BCC4" stroke="#0E1530" stroke-width="1"/>
  <!-- Shutter slot -->
  <rect x="14" y="3" width="4" height="7" fill="#7A8088"/>
  <!-- Label -->
  <rect x="6" y="14" width="16" height="10" rx="1" fill="#E8E4D0" stroke="#0E1530" stroke-width="1"/>
  <!-- Label lines -->
  <rect x="8" y="17" width="12" height="1.4" fill="#8A8770"/>
  <rect x="8" y="20" width="12" height="1.4" fill="#8A8770"/>
</svg>
